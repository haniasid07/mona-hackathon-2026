<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Problem 1 — Invoice Processing Automation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; padding: 2rem; color: #1a1a18; }
  .container { max-width: 820px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 2rem; }
  h1 { font-size: 22px; font-weight: 500; }
  .subtitle { font-size: 14px; color: #888; margin-top: 2px; }
  .card { background: white; border: 1px solid #e5e5e3; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .upload-zone { border: 1.5px dashed #ccc; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; background: white; transition: background 0.15s; }
  .upload-zone:hover { background: #f5f5f3; }
  .section-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .invoice-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
  .inv-item { border: 1px solid #e5e5e3; border-radius: 8px; padding: 10px 12px; cursor: pointer; background: white; transition: all 0.15s; display: flex; align-items: center; gap: 10px; }
  .inv-item:hover { border-color: #aaa; background: #fafaf8; }
  .inv-item.active { border-color: #378ADD; border-width: 2px; background: #EBF4FC; }
  .inv-icon { font-size: 20px; flex-shrink: 0; }
  .inv-name { font-size: 12px; font-weight: 500; line-height: 1.3; }
  .inv-meta { font-size: 11px; color: #888; margin-top: 2px; }
  .inv-status { margin-left: auto; flex-shrink: 0; }
  .process-btn { width: 100%; padding: 14px; background: #1a1a18; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 1rem; transition: background 0.15s; }
  .process-btn:hover { background: #333; }
  .process-btn:disabled { background: #aaa; cursor: not-allowed; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result-card { background: white; border: 1px solid #e5e5e3; border-radius: 12px; padding: 1.25rem; margin-top: 1rem; }
  .dept-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 6px; }
  .dept-IT { background: #E6F1FB; color: #185FA5; }
  .dept-Finance { background: #EAF3DE; color: #3B6D11; }
  .dept-Facilities { background: #FAEEDA; color: #854F0B; }
  .dept-HR { background: #FBEAF0; color: #993556; }
  .dept-Legal { background: #EEEDFE; color: #3C3489; }
  .dept-Operations { background: #E1F5EE; color: #0F6E56; }
  .dept-Marketing { background: #FAECE7; color: #993C1D; }
  .meta-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f5f5f3; font-size: 14px; }
  .meta-row:last-child { border-bottom: none; }
  .meta-label { color: #888; }
  .meta-val { font-weight: 500; text-align: right; }
  .priority-high { color: #A32D2D; }
  .priority-normal { color: #3B6D11; }
  .priority-low { color: #888; }
  .action-box { background: #f5f5f3; border-radius: 8px; padding: 12px; margin-top: 1rem; font-size: 13px; line-height: 1.6; }
  .action-label { font-size: 11px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .queue-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 0.5rem; }
  .queue-table th { text-align: left; padding: 8px 10px; background: #f5f5f3; color: #888; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .queue-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0ee; vertical-align: middle; }
  .queue-table tr:last-child td { border-bottom: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span style="font-size:32px;">🧾</span>
    <div>
      <h1>Invoice processing automation</h1>
      <div class="subtitle">Globus Group St. Wendel — Problem 1 — Auto-categorise & route supplier invoices</div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Upload your own invoice</div>
    <div class="upload-zone" onclick="document.getElementById('invInput').click()" ondragover="event.preventDefault(); this.style.background='#f0f0ee'" ondragleave="this.style.background='white'" ondrop="handleDrop(event)">
      <div style="font-size:32px;margin-bottom:10px;">⬆️</div>
      <div style="font-weight:500;">Drop an invoice here</div>
      <div style="font-size:13px;color:#888;margin-top:4px;">PDF, PNG, JPG, or DOCX</div>
    </div>
    <input type="file" id="invInput" accept=".pdf,.png,.jpg,.jpeg,.docx" style="display:none" onchange="handleUpload(this.files[0])">
  </div>

  <div class="card">
    <div class="section-label">Or select a sample invoice to process</div>
    <div class="invoice-grid" id="invoiceGrid"></div>
    <button class="process-btn" id="processBtn" onclick="processSelected()" disabled>
      Process invoice ↗
    </button>
  </div>

  <div id="resultArea"></div>
  <div id="queueArea"></div>
</div>

<script>
const SAMPLES = [
  { id: '01', name: 'Stadtwerke München', type: 'Gas bill', lang: 'DE', fmt: 'PDF', amount: '258,44 €', icon: '🔥',
    text: `Stadtwerke München GmbH - RECHNUNG - GAS-2026-004871\nRechnungsdatum: 01.06.2026\nFälligkeitsdatum: 15.06.2026\nLeistungszeitraum: 01.05.2026 - 31.05.2026\nKundennummer: KD-7823941\nVertragspartner: Globus Group GmbH, Lagerstraße 14, 66606 St. Wendel\nPosition: Gasverbrauch Gewerbe - 2.580 kWh à 0,0940 €: 242,52 €\nGrundpreis: 12,50 €\nNetto: 255,02 €\nMwSt 7%: 17,85 €\nGesamtbetrag: 258,44 €\nBankverbindung: IBAN DE12 7015 0000 0012 3456 78, BIC SSKMDEMM\nVerwendungszweck: GAS-2026-004871` },
  { id: '02', name: 'Microsoft Ireland', type: 'Software licenses', lang: 'EN', fmt: 'PDF', amount: '€2,407.43', icon: '💻',
    text: `Microsoft Ireland Operations Ltd. - INVOICE EA-INV-7741920\nInvoice Date: 2026-06-01, Due Date: 2026-07-01\nBill To: Globus Group GmbH, IT Department, 66606 St. Wendel\nMicrosoft 365 E3 - 45 seats x €42.00 = €1,890.00\nAzure Active Directory Premium P2 - 45 seats x €8.78 = €395.10\nSubtotal: €2,285.10, VAT 23%: €122.33, Total Due: €2,407.43\nPayment: Wire transfer, IBAN IE29 AIBK 9311 5212 3456 78` },
  { id: '03', name: 'E.ON Energie', type: 'Electricity bill', lang: 'DE', fmt: 'PNG', amount: '163,09 €', icon: '⚡',
    text: `E.ON Energie Deutschland GmbH - RECHNUNG - EON-2026-881203\nRechnungsdatum: 03.06.2026, Fällig: 17.06.2026\nStromverbrauch Gewerbe: 01.05.2026 - 31.05.2026\nVerbrauch: 820 kWh à 0,1850 €: 151,70 €\nMwSt 19%: 28,82 €, Netto: 137,05 €, Gesamt: 163,09 €\nKundennr: 4419238, Zählernr: Z-00192847` },
  { id: '04', name: 'Amazon Web Services', type: 'Cloud services', lang: 'EN', fmt: 'DOCX', amount: '$7,216.15', icon: '☁️',
    text: `Amazon Web Services EMEA SARL - TAX INVOICE AWS-2026-06-0041872\nBilling Period: June 1–30, 2026, Invoice Date: 2026-07-01\nBill To: Globus Group GmbH, IT/Cloud Team\nEC2 Compute (r6i.2xlarge x3, on-demand): $3,812.40\nRDS PostgreSQL (db.r6g.xlarge Multi-AZ): $1,644.80\nS3 Storage (12.4 TB): $286.24, CloudFront CDN: $394.50\nData Transfer Out (8.2 TB): $738.00, Support (Business): $340.21\nSubtotal: $7,216.15, VAT 0% (reverse charge): $0.00, Total: $7,216.15` },
  { id: '05', name: 'Bürobedarf Schmidt', type: 'Office supplies', lang: 'DE', fmt: 'PNG', amount: '841,88 €', icon: '📎',
    text: `Bürobedarf Schmidt GmbH - RECHNUNG - BS-2026-0441\nRechnungsdatum: 05.06.2026, Fällig: 19.06.2026\nDrucker HP LaserJet Pro (3 Stück): 420,00 €\nDruckerpatronen Sortiment: 89,40 €\nBüropapier A4 80g (20 Pakete): 94,00 €\nStifte, Ordner, Kleinmaterial: 67,58 €\nNetto: 671,00 €, MwSt 19%: 127,49 €, Gesamt inkl. MwSt: 841,88 €` },
  { id: '06', name: 'Brightpath Consulting', type: 'Professional services', lang: 'EN', fmt: 'DOCX', amount: '€26,153.18', icon: '🏢',
    text: `Brightpath Consulting GmbH - INVOICE BC-2026-0219\nInvoice Date: 2026-06-10, Payment Due: 2026-07-10\nBill To: Globus Group GmbH, Finance & Strategy\nProject: Supply Chain Optimisation — Phase 2\nSenior Consultant (62 hrs x €195.00): €12,090.00\nData Analyst (88 hrs x €120.00): €10,560.00\nTravel & Expenses (receipts attached): €1,482.50\nSubtotal: €24,132.50, VAT 19%: €4,585.18, Less advance payment: -€2,564.50\nTotal Due: €26,153.18` },
  { id: '07', name: 'Hotel Adlon Kempinski', type: 'Hotel stay', lang: 'DE', fmt: 'DOCX', amount: '1.625,65 €', icon: '🏨',
    text: `Hotel Adlon Kempinski Berlin - RECHNUNG - HA-2026-58801\nRechnungsdatum: 08.06.2026\nGast: Globus Group GmbH / Dr. M. Hoffmann (Geschäftsreise)\nZimmer Deluxe (3 Nächte, 05.06–08.06.2026): 1.350,00 €\nFrühstück (3x): 135,00 €\nRestaurant: 87,50 €, Minibar: 23,00 €\nNetto: 1.370,06 €, MwSt 7% (Übernachtung): 94,50 €, MwSt 19% (F&B): 24,84 €\nSumme: 1.625,65 €` },
  { id: '08', name: 'Adobe Creative Cloud', type: 'Software subscription', lang: 'EN', fmt: 'PNG', amount: '496,10 €', icon: '🎨',
    text: `Adobe Systems Ireland Ltd - TAX INVOICE ADB-2026-EUR-884421\nInvoice Date: 2026-06-01, Due: 2026-07-01\nBill To: Globus Group GmbH, Marketing Department\nAdobe Creative Cloud All Apps - 5 licenses x €82.99/month: €414,95\nAdobe Stock (50 images/mo) - 1 license: €64,87\nSubtotal: €416,72, VAT 19%: €79,38, Total: €496,10` },
  { id: '09', name: 'Deutsche Telekom', type: 'Internet & telephone', lang: 'DE', fmt: 'PDF', amount: '86,73 €', icon: '📞',
    text: `Telekom Deutschland GmbH - RECHNUNG - TK-2026-5520318\nRechnungsdatum: 01.06.2026, Fällig: 15.06.2026\nMagentaBusiness Internet 1000 (Festnetz): 49,95 €\nTelefonflatrate Business: 14,95 €\nMobilfunk Business S (1 SIM): 14,95 €\nNetto: 72,88 €, MwSt 19%: 13,85 €, Gesamt: 86,73 €\nVertragsnr: VT-8847293` },
  { id: '10', name: 'Dell GmbH', type: 'Hardware purchase', lang: 'EN', fmt: 'PNG', amount: '€17,814.30', icon: '🖥️',
    text: `Dell GmbH - INVOICE DELL-2026-DE-009241\nInvoice Date: 2026-06-12, Due Date: 2026-07-12\nBill To: Globus Group GmbH, IT Procurement\nDell PowerEdge R750 Server (x1): €8,440.00\nDell Latitude 5540 Laptop (x5 @ €1,199.00): €5,995.00\nDell 27" UltraSharp Monitor (x5 @ €449.00): €2,245.00\nDell 3-Year ProSupport: €644.00\nSubtotal: €14,970.00, VAT 19%: €2,844.30, Total: €17,814.30` }
];

const processed = [];
let selectedIdx = null;

function buildGrid() {
  const grid = document.getElementById('invoiceGrid');
  SAMPLES.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'inv-item';
    div.id = 'inv-' + i;
    div.innerHTML = `
      <span class="inv-icon">${s.icon}</span>
      <div style="flex:1;min-width:0;">
        <div class="inv-name">${s.name}</div>
        <div class="inv-meta">${s.type} · ${s.fmt} · ${s.amount}</div>
      </div>
      <div class="inv-status" id="invstat-${i}"></div>`;
    div.onclick = () => selectInv(i, div);
    grid.appendChild(div);
  });
}

function selectInv(i, el) {
  document.querySelectorAll('.inv-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  selectedIdx = i;
  document.getElementById('processBtn').disabled = false;
}

function handleDrop(e) {
  e.preventDefault();
  document.querySelector('.upload-zone').style.background = 'white';
  if (e.dataTransfer.files[0]) handleUpload(e.dataTransfer.files[0]);
}

async function handleUpload(file) {
  showLoading('Reading ' + file.name + '...');
  const reader = new FileReader();
  reader.onload = async (e) => {
    const b64 = e.target.result.split(',')[1];
    const mt = file.type || 'application/pdf';
    await callClaudeWithFile(b64, mt, file.name);
  };
  reader.readAsDataURL(file);
}

async function processSelected() {
  if (selectedIdx === null) return;
  const inv = SAMPLES[selectedIdx];
  const btn = document.getElementById('processBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Processing invoice...';
  showLoading('Analysing ' + inv.name + '...');
  await callClaudeWithText(inv.text, inv.name, selectedIdx);
  btn.disabled = false;
  btn.innerHTML = 'Process invoice ↗';
}

const PROMPT = (name, text) => `You are an intelligent invoice processing agent for Globus Group GmbH (a large German retail company).

Analyse this invoice and return ONLY valid JSON:
{
  "vendor": string,
  "invoice_number": string or null,
  "invoice_date": string or null,
  "due_date": string or null,
  "currency": string,
  "net_amount": string,
  "vat_amount": string,
  "total_amount": string,
  "vat_rate": string,
  "invoice_type": string,
  "department": "IT" | "Finance" | "Facilities" | "HR" | "Legal" | "Operations" | "Marketing",
  "department_reason": string (one sentence why),
  "approver": string (job title who should approve this),
  "priority": "high" | "normal" | "low",
  "priority_reason": string,
  "payment_terms": string,
  "flags": [string] (any issues: missing data, unusual amount, foreign currency, etc.),
  "action_required": string (plain English instruction for the finance team),
  "summary": string (one sentence)
}

Department routing rules:
- IT: software, hardware, cloud, licenses, telecoms
- Facilities: utilities (gas, electricity, water), office supplies, hotel/travel
- Finance: consulting/professional services, legal, auditing
- HR: recruitment, training, employee benefits
- Marketing: advertising, creative tools, design services
- Operations: logistics, shipping, manufacturing supplies
- Legal: legal services, compliance

Invoice text:
${text}`;

async function callClaudeWithText(text, name, idx) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 1500,
        system: 'You are an invoice processing expert. Return ONLY valid JSON, no markdown.',
        messages: [{ role: 'user', content: PROMPT(name, text) }]
      })
    });
    const data = await res.json();
    const txt = data.content.map(i => i.text || '').join('');
    const r = JSON.parse(txt.replace(/```json|```/g, '').trim());
    renderResult(r, idx);
    addToQueue(r, idx);
  } catch { showError(); }
}

async function callClaudeWithFile(b64, mt, name) {
  const isImg = mt.includes('image');
  const isPDF = mt.includes('pdf');
  try {
    const content = [];
    if (isImg) content.push({ type: 'image', source: { type: 'base64', media_type: mt, data: b64 } });
    else if (isPDF) content.push({ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: b64 } });
    content.push({ type: 'text', text: PROMPT(name, isPDF || isImg ? '[See attached document]' : '') });

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 1500,
        system: 'You are an invoice processing expert. Return ONLY valid JSON, no markdown.',
        messages: [{ role: 'user', content }]
      })
    });
    const data = await res.json();
    const txt = data.content.map(i => i.text || '').join('');
    const r = JSON.parse(txt.replace(/```json|```/g, '').trim());
    renderResult(r, null);
    addToQueue(r, null);
  } catch { showError(); }
}

function showLoading(msg) {
  document.getElementById('resultArea').innerHTML = `<div style="background:white;border:1px solid #e5e5e3;border-radius:12px;padding:2rem;text-align:center;color:#888;font-size:14px;"><span class="spinner"></span>${msg}</div>`;
}
function showError() {
  document.getElementById('resultArea').innerHTML = '<div style="background:white;border:1px solid #e5e5e3;border-radius:12px;padding:1.5rem;color:#A32D2D;">Processing failed. Please try again.</div>';
}

function deptClass(dept) {
  const map = { IT:'dept-IT', Finance:'dept-Finance', Facilities:'dept-Facilities', HR:'dept-HR', Legal:'dept-Legal', Operations:'dept-Operations', Marketing:'dept-Marketing' };
  return map[dept] || 'dept-Finance';
}

function renderResult(r, idx) {
  if (idx !== null && idx !== undefined) {
    const statEl = document.getElementById('invstat-' + idx);
    if (statEl) {
      const deptCls = deptClass(r.department);
      statEl.innerHTML = `<span class="dept-badge ${deptCls}" style="font-size:10px;">${r.department}</span>`;
    }
  }
  const priCol = r.priority === 'high' ? '#A32D2D' : r.priority === 'normal' ? '#3B6D11' : '#888';
  const flags = (r.flags || []).map(f => `<div style="display:flex;gap:8px;padding:4px 0;font-size:13px;"><span style="color:#BA7517;">⚠</span><span>${f}</span></div>`).join('') || '<span style="font-size:13px;color:#3B6D11;">No issues detected</span>';

  const row = (l, v) => v ? `<div class="meta-row"><span class="meta-label">${l}</span><span class="meta-val">${v}</span></div>` : '';

  document.getElementById('resultArea').innerHTML = `
    <div class="result-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-size:16px;font-weight:500;">${r.vendor || 'Unknown vendor'}</div>
          <div style="font-size:13px;color:#888;margin-top:2px;">${r.invoice_type || ''} · ${r.invoice_number || 'No invoice number'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="dept-badge ${deptClass(r.department)}">${r.department}</span>
          <span style="font-size:13px;font-weight:500;color:${priCol};">${r.priority?.toUpperCase()} priority</span>
        </div>
      </div>

      <p style="font-size:14px;color:#555;font-style:italic;margin-bottom:1rem;">${r.summary || ''}</p>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
        <div>
          ${row('Invoice number', r.invoice_number)}
          ${row('Invoice date', r.invoice_date)}
          ${row('Due date', r.due_date)}
          ${row('Payment terms', r.payment_terms)}
        </div>
        <div>
          ${row('Net amount', r.net_amount)}
          ${row('VAT', r.vat_amount + ' (' + r.vat_rate + ')')}
          ${row('Total amount', `<strong>${r.total_amount}</strong>`)}
          ${row('Currency', r.currency)}
        </div>
      </div>

      <div style="background:#f5f5f3;border-radius:8px;padding:12px;margin-bottom:1rem;">
        <div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">Routing</div>
        <div style="font-size:14px;"><strong>${r.department}</strong> department — for approval by <strong>${r.approver || 'Department Head'}</strong></div>
        <div style="font-size:13px;color:#888;margin-top:4px;">${r.department_reason || ''}</div>
      </div>

      ${r.flags && r.flags.length ? `<div style="margin-bottom:1rem;"><div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">Flags</div>${flags}</div>` : ''}

      <div class="action-box">
        <div class="action-label">Action required</div>
        ${r.action_required || ''}
      </div>
    </div>`;
}

function addToQueue(r, idx) {
  processed.push(r);
  renderQueue();
}

function renderQueue() {
  if (processed.length === 0) return;
  const rows = processed.map(r => {
    const priCol = r.priority === 'high' ? '#A32D2D' : r.priority === 'normal' ? '#3B6D11' : '#888';
    return `<tr>
      <td>${r.vendor || '-'}</td>
      <td><span class="dept-badge ${deptClass(r.department)}">${r.department}</span></td>
      <td>${r.total_amount || '-'}</td>
      <td style="color:${priCol};font-weight:500;">${r.priority || '-'}</td>
      <td style="color:#888;">${r.due_date || '-'}</td>
      <td style="font-size:12px;color:#555;">${r.approver || '-'}</td>
    </tr>`;
  }).join('');

  document.getElementById('queueArea').innerHTML = `
    <div class="result-card" style="margin-top:1rem;">
      <div style="font-size:15px;font-weight:500;margin-bottom:1rem;">📋 Processing queue (${processed.length} invoice${processed.length > 1 ? 's' : ''})</div>
      <div style="overflow-x:auto;">
        <table class="queue-table">
          <thead><tr>
            <th>Vendor</th><th>Department</th><th>Amount</th><th>Priority</th><th>Due date</th><th>Approver</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

buildGrid();
</script>
</body>
</html>
